<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gatebook Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --indigo:#6366F1; --indigo-bg:#EEF2FF; --green:#16A34A; --green-bg:#F0FDF4;
    --red:#DC2626; --red-bg:#FEF2F2; --amber:#D97706; --amber-bg:#FFFBEB;
    --purple:#7C3AED; --purple-bg:#F5F3FF;
    --text:#111827; --text2:#4B5563; --muted:#9CA3AF;
    --surface:#FFFFFF; --surface2:#F9FAFB; --surface3:#F3F4F6;
    --border:#E5E7EB; --border2:#D1D5DB;
    --font:'Plus Jakarta Sans',sans-serif;
    --r-sm:8px; --r-md:12px; --r-lg:16px;
    --shadow:0 1px 4px rgba(0,0,0,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--surface2);color:var(--text);min-height:100vh}
  .navbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 24px;height:56px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .nav-brand{display:flex;align-items:center;gap:10px}
  .nav-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366F1,#8B5CF6);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
  .nav-title{font-size:16px;font-weight:800;color:var(--text)}
  .nav-title span{color:var(--indigo)}
  .nav-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;
    background:var(--indigo-bg);color:var(--indigo);border:1px solid #C7D2FE}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);
    font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
  .btn-indigo{background:var(--indigo);color:#fff}
  .btn-white{background:var(--surface);color:var(--text2);border:1.5px solid var(--border2)}
  .btn-red{background:var(--red);color:#fff}
  .btn-amber{background:var(--amber);color:#fff}
  .btn-sm{padding:5px 10px;font-size:11px}
  .page{padding:24px;max-width:1280px;margin:0 auto}
  .stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
  .scard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);
    padding:14px 16px;box-shadow:var(--shadow)}
  .scard-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .scard-val{font-size:22px;font-weight:800;color:var(--text)}
  .scard-sub{font-size:10px;color:var(--text2);margin-top:2px}
  .filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .ctrl{height:34px;padding:0 10px;border:1.5px solid var(--border2);border-radius:var(--r-sm);
    font-family:var(--font);font-size:12px;font-weight:600;color:var(--text);
    background:var(--surface);outline:none;cursor:pointer}
  .search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:0 10px;height:34px;flex:1;min-width:200px}
  .search-wrap input{border:none;outline:none;font-family:var(--font);font-size:12px;
    font-weight:600;color:var(--text);background:transparent;width:100%}
  .table-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);
    overflow:hidden;box-shadow:var(--shadow)}
  .table-head{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1.5px solid var(--border2)}
  .table-title{font-size:13px;font-weight:800;color:var(--text)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead tr{background:var(--surface3)}
  th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--border2);white-space:nowrap}
  td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--surface2)}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
    padding:2px 8px;border-radius:99px;white-space:nowrap}
  .badge-green{background:var(--green-bg);color:var(--green);border:1px solid #BBF7D0}
  .badge-red{background:var(--red-bg);color:var(--red);border:1px solid #FECACA}
  .badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid #FDE68A}
  .badge-indigo{background:var(--indigo-bg);color:var(--indigo);border:1px solid #C7D2FE}
  .badge-gray{background:var(--surface3);color:var(--text2);border:1px solid var(--border2)}
  .badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid #DDD6FE}
  .badge-paused{background:var(--amber-bg);color:var(--amber);border:1px solid #FDE68A}
  .modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);
    align-items:flex-end;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:680px;
    max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-header{display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px 12px;border-bottom:1.5px solid var(--border2);flex-shrink:0}
  .modal-body{overflow-y:auto;padding:18px 20px;flex:1}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .detail-item label{display:block;font-size:9px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .detail-item .val{font-size:13px;font-weight:700;color:var(--text)}
  .section-title{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;
    letter-spacing:.5px;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
  .plan-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .plan-row label{font-size:11px;font-weight:700;color:var(--text2);min-width:90px}
  .plan-row select,.plan-row input{height:32px;padding:0 8px;border:1.5px solid var(--border2);
    border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;
    color:var(--text);background:var(--surface);outline:none}
  .loading{display:flex;align-items:center;justify-content:center;height:200px;
    color:var(--muted);font-size:13px;gap:8px}
  .spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--indigo);
    border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .copy-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px;
    border-radius:4px;font-size:11px;transition:color .15s}
  .copy-btn:hover{color:var(--indigo)}
  @media(max-width:900px){
    .stats-row{grid-template-columns:repeat(3,1fr)}
    .page{padding:14px}
    .detail-grid{grid-template-columns:1fr}
    th:nth-child(5),td:nth-child(5),
    th:nth-child(8),td:nth-child(8){display:none}
  }
  @media(max-width:600px){
    .stats-row{grid-template-columns:repeat(2,1fr)}
    th:nth-child(4),td:nth-child(4),
    th:nth-child(7),td:nth-child(7){display:none}
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo"><i class="ti ti-shield-check"></i></div>
    <div><div class="nav-title">Gate<span>book</span> Admin</div></div>
    <span class="nav-badge" id="totalBadge">Loading…</span>
  </div>
  <button class="btn btn-white btn-sm" onclick="doSignOut()"><i class="ti ti-logout"></i> Sign Out</button>
</nav>

<div class="page">

  <div class="stats-row">
    <div class="scard">
      <div class="scard-label">Total Users</div>
      <div class="scard-val" id="statTotal">—</div>
      <div class="scard-sub">Registered apartments</div>
    </div>
    <div class="scard">
      <div class="scard-label">Active</div>
      <div class="scard-val" style="color:var(--green)" id="statActive">—</div>
      <div class="scard-sub">Trial / paid</div>
    </div>
    <div class="scard">
      <div class="scard-label">Expired</div>
      <div class="scard-val" style="color:var(--red)" id="statExpired">—</div>
      <div class="scard-sub">Past expiry</div>
    </div>
    <div class="scard">
      <div class="scard-label">Paused</div>
      <div class="scard-val" style="color:var(--amber)" id="statPaused">—</div>
      <div class="scard-sub">Access suspended</div>
    </div>
    <div class="scard">
      <div class="scard-label">This Month</div>
      <div class="scard-val" style="color:var(--indigo)" id="statThisMonth">—</div>
      <div class="scard-sub">New signups</div>
    </div>
    <div class="scard">
      <div class="scard-label">Paid Users</div>
      <div class="scard-val" style="color:var(--amber)" id="statPaid">—</div>
      <div class="scard-sub">On paid plan</div>
    </div>
  </div>

  <div class="filters">
    <div class="search-wrap">
      <i class="ti ti-search" style="color:var(--muted);font-size:14px"></i>
      <input type="text" id="searchQ" placeholder="Search name, email, login ID, apartment…" oninput="renderTable()"/>
    </div>
    <select class="ctrl" id="filterStatus" onchange="renderTable()">
      <option value="all">All status</option>
      <option value="active">Active</option>
      <option value="paused">Paused</option>
      <option value="expired">Expired</option>
      <option value="trial">Trial</option>
    </select>
    <select class="ctrl" id="filterPlan" onchange="renderTable()">
      <option value="all">All plans</option>
      <option value="trial">Trial</option>
      <option value="paid">Paid</option>
    </select>
    <button class="btn btn-white btn-sm" onclick="loadUsers()"><i class="ti ti-refresh"></i> Refresh</button>
  </div>

  <div class="table-card">
    <div class="table-head">
      <div class="table-title"><i class="ti ti-users" style="color:var(--indigo)"></i> All Users
        <span id="visibleCount" style="font-size:11px;color:var(--muted);font-weight:600"></span>
      </div>
    </div>
    <div id="tableWrap">
      <div class="loading"><div class="spinner"></div> Loading users…</div>
    </div>
  </div>

</div>

<div class="modal-bg" id="detailModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div style="font-size:15px;font-weight:800;color:var(--text)" id="modalTitle">User</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px" id="modalSub"></div>
      </div>
      <button onclick="closeModal()" style="background:var(--surface2);border:none;border-radius:50%;
        width:30px;height:30px;cursor:pointer;color:var(--text2);font-size:16px;
        display:flex;align-items:center;justify-content:center"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script type="module">
import { initializeApp }       from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail }
                               from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, writeBatch }
                               from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

const ADMIN_EMAIL = 'admin@gatebook.app';
const app  = initializeApp({
  apiKey:"AIzaSyAnUvPo_G_efbacdDApbULQgY5OToghJYM",
  authDomain:"gatebook-17065.firebaseapp.com",
  projectId:"gatebook-17065",
  storageBucket:"gatebook-17065.firebasestorage.app",
  messagingSenderId:"732765572762",
  appId:"1:732765572762:web:55f1cb897bb5804a831923",
});
const auth = getAuth(app);
const db   = getFirestore(app);

let allUsers = [];

onAuthStateChanged(auth, user => {
  if (!user || user.email !== ADMIN_EMAIL) {
    window.location.replace('index.html');
  } else { loadUsers(); }
});

window.loadUsers = async function() {
  document.getElementById('tableWrap').innerHTML =
    '<div class="loading"><div class="spinner"></div> Loading users…</div>';
  try {
    const snap = await getDocs(collection(db,'apartments'));
    const userPromises = snap.docs.map(async d => {
      const data = d.data();
      let flatCount = 0;
      try {
        const fSnap = await getDocs(collection(db,'apartments',d.id,'flats'));
        flatCount = fSnap.size;
      } catch(e) { flatCount = data.totalFlats || 0; }
      const norm = { uid:d.id, flatCount, ...data };
      norm.name       = data.name || data.aptName || data.apartmentName || '';
      norm.adminName  = data.adminName || data.ownerName || data.displayName || '';
      norm.adminEmail = data.adminEmail || data.email || data.ownerEmail || '';
      return norm;
    });
    allUsers = await Promise.all(userPromises);
    allUsers.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    renderStats();
    renderTable();
  } catch(e) {
    document.getElementById('tableWrap').innerHTML =
      `<div class="loading" style="color:var(--red)"><i class="ti ti-alert-circle"></i> Failed: ${e.message}</div>`;
  }
};

function getStatus(u) {
  if (u.status === 'paused') return 'paused';
  if (!u.expiryDate) return 'unknown';
  return new Date(u.expiryDate) > new Date()
    ? (u.plan==='paid' ? 'paid' : 'active') : 'expired';
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}

function daysLeft(iso) {
  if (!iso) return null;
  return Math.ceil((new Date(iso) - new Date()) / 86400000);
}

function renderStats() {
  const thisM   = new Date().toISOString().slice(0,7);
  const active  = allUsers.filter(u=>['active','paid'].includes(getStatus(u))).length;
  const expired = allUsers.filter(u=>getStatus(u)==='expired').length;
  const paused  = allUsers.filter(u=>getStatus(u)==='paused').length;
  const newM    = allUsers.filter(u=>(u.createdAt||'').startsWith(thisM)).length;
  const paid    = allUsers.filter(u=>u.plan==='paid').length;
  document.getElementById('statTotal').textContent     = allUsers.length;
  document.getElementById('statActive').textContent    = active;
  document.getElementById('statExpired').textContent   = expired;
  document.getElementById('statPaused').textContent    = paused;
  document.getElementById('statThisMonth').textContent = newM;
  document.getElementById('statPaid').textContent      = paid;
  document.getElementById('totalBadge').textContent    = `${allUsers.length} users`;
}

window.renderTable = function() {
  const q  = document.getElementById('searchQ').value.toLowerCase();
  const fs = document.getElementById('filterStatus').value;
  const fp = document.getElementById('filterPlan').value;

  let rows = allUsers.filter(u => {
    const s = getStatus(u);
    if (fs !== 'all') {
      if (fs==='active'  && s!=='active' && s!=='paid') return false;
      if (fs==='expired' && s!=='expired') return false;
      if (fs==='trial'   && u.plan!=='trial') return false;
      if (fs==='paused'  && s!=='paused') return false;
    }
    if (fp !== 'all' && (u.plan||'trial') !== fp) return false;
    if (q) {
      const loginId = (u.adminEmail||'').split('@')[0].toLowerCase();
      const hay = `${u.name||''} ${u.adminName||''} ${u.adminEmail||''} ${loginId} ${u.uid}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('visibleCount').textContent = `(${rows.length})`;
  if (!rows.length) {
    document.getElementById('tableWrap').innerHTML =
      '<div class="loading"><i class="ti ti-inbox"></i> No users match</div>';
    return;
  }

  const statusBadge = u => {
    const s = getStatus(u);
    const days = daysLeft(u.expiryDate);
    if (s==='paused')  return `<span class="badge badge-paused"><i class="ti ti-player-pause"></i> Paused</span>`;
    if (s==='expired') return `<span class="badge badge-red"><i class="ti ti-clock-off"></i> Expired</span>`;
    if (s==='paid')    return `<span class="badge badge-green"><i class="ti ti-circle-check"></i> Paid</span>`;
    if (days!==null && days<=7) return `<span class="badge badge-amber"><i class="ti ti-clock"></i> ${days}d left</span>`;
    return `<span class="badge badge-indigo"><i class="ti ti-clock"></i> Trial</span>`;
  };

  const planBadge = u =>
    (u.plan||'trial')==='paid'
      ? `<span class="badge badge-green">Paid</span>`
      : `<span class="badge badge-gray">Trial</span>`;

  document.getElementById('tableWrap').innerHTML = `
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>#</th>
        <th>Apartment</th>
        <th>Admin / Email</th>
        <th>Login ID</th>
        <th>Flats</th>
        <th>Plan</th>
        <th>Status</th>
        <th>Registered</th>
        <th>Expiry</th>
        <th>Actions</th>
      </tr></thead>
      <tbody>
        ${rows.map((u,i) => {
          const loginId = (u.adminEmail||'').split('@')[0] || '—';
          return `<tr>
            <td style="color:var(--muted);font-size:11px">${i+1}</td>
            <td>
              <div style="font-weight:800;font-size:13px">${u.name||'—'}</div>
              <div style="font-size:10px;color:var(--muted)">${u.uid.slice(0,8)}…</div>
            </td>
            <td>
              <div style="font-weight:700">${u.adminName||'—'}</div>
              <div style="font-size:10px;color:var(--text2)">${u.adminEmail||'—'}</div>
            </td>
            <td>
              <span style="font-family:monospace;font-size:12px;font-weight:700;
                background:var(--indigo-bg);color:var(--indigo);padding:2px 8px;border-radius:6px">
                ${loginId}
              </span>
            </td>
            <td style="font-weight:700;text-align:center">${u.flatCount||0}</td>
            <td>${planBadge(u)}</td>
            <td>${statusBadge(u)}</td>
            <td style="color:var(--text2);font-size:11px">${fmtDate(u.createdAt)}</td>
            <td style="color:var(--text2);font-size:11px">${fmtDate(u.expiryDate)}</td>
            <td>
              <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
                <button class="btn btn-white btn-sm" onclick="openUser('${u.uid}')">
                  <i class="ti ti-eye"></i> View
                </button>
                ${getStatus(u)==='paused'
                  ? `<button class="btn btn-sm" style="background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7"
                       onclick="togglePause('${u.uid}',false)">
                       <i class="ti ti-player-play"></i> Activate
                     </button>`
                  : `<button class="btn btn-sm" style="background:#FEF3C7;color:#92400E;border:1px solid #FCD34D"
                       onclick="togglePause('${u.uid}',true)">
                       <i class="ti ti-player-pause"></i> Pause
                     </button>`
                }
                <button class="btn btn-sm"
                  style="background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5"
                  onclick="deleteApartment('${u.uid}','${(u.name||'').replace(/'/g,'')}')">
                  <i class="ti ti-trash"></i>
                </button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>`;
};

window.openUser = function(uid) {
  const u = allUsers.find(x=>x.uid===uid);
  if (!u) return;
  const s    = getStatus(u);
  const days = daysLeft(u.expiryDate);
  const loginId = (u.adminEmail||'').split('@')[0] || '—';

  document.getElementById('modalTitle').textContent = u.name || '—';
  document.getElementById('modalSub').textContent   = u.adminEmail || '';

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-item"><label>Admin Name</label><div class="val">${u.adminName||'—'}</div></div>
      <div class="detail-item"><label>Login ID</label>
        <div class="val" style="display:flex;align-items:center;gap:6px">
          <span style="font-family:monospace;font-size:13px;background:var(--indigo-bg);color:var(--indigo);padding:2px 8px;border-radius:6px">${loginId}</span>
          <button class="copy-btn" onclick="navigator.clipboard.writeText('${u.adminEmail||''}');this.innerHTML='✓';setTimeout(()=>this.innerHTML='<i class=\'ti ti-copy\'></i>',1500)"><i class="ti ti-copy"></i></button>
        </div>
      </div>
      <div class="detail-item"><label>Email</label><div class="val" style="font-size:12px">${u.adminEmail||'—'}</div></div>
      <div class="detail-item"><label>Total Flats</label><div class="val">${u.flatCount||0}</div></div>
      <div class="detail-item"><label>Registered</label><div class="val">${fmtDate(u.createdAt)}</div></div>
      <div class="detail-item"><label>Activated</label><div class="val">${fmtDate(u.activatedAt||u.createdAt)}</div></div>
      <div class="detail-item"><label>Expiry</label>
        <div class="val" style="color:${s==='expired'?'var(--red)':days!==null&&days<=7?'var(--amber)':'var(--text)'}">
          ${fmtDate(u.expiryDate)}${days!==null?' ('+days+'d)':''}
        </div>
      </div>
      <div class="detail-item"><label>Status</label>
        <div class="val">${
          s==='paused'  ? '<span style="color:var(--amber)">⏸ Paused</span>' :
          s==='expired' ? '<span style="color:var(--red)">Expired</span>' :
          s==='paid'    ? '<span style="color:var(--green)">Paid</span>' :
                          '<span style="color:var(--indigo)">Active (Trial)</span>'
        }</div>
      </div>
      <div class="detail-item"><label>Plan</label><div class="val">${(u.plan||'trial').charAt(0).toUpperCase()+(u.plan||'trial').slice(1)}</div></div>
      <div class="detail-item"><label>Blocks</label><div class="val" style="font-size:12px">${(u.blocks||[]).map(b=>b.name||'Block').join(', ')||'—'}</div></div>
    </div>

    <div class="section-title"><i class="ti ti-building" style="color:var(--indigo)"></i> Blocks & Flats</div>
    <div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:14px">
      <div class="plan-row"><label>Total Flats</label>
        <input type="number" id="editFlatCount" min="0" value="${u.flatCount||0}" style="width:80px"/>
      </div>
      <div class="plan-row" style="align-items:flex-start"><label style="padding-top:6px">Blocks</label>
        <div style="flex:1">
          <div id="blocksEditor" style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">
            ${(u.blocks&&u.blocks.length?u.blocks:[{name:''}]).map((b,i)=>`
            <div style="display:flex;align-items:center;gap:6px" id="blockRow_${i}">
              <input type="text" placeholder="Block name e.g. A" value="${b.name||''}"
                style="flex:1;height:30px;padding:0 8px;border:1.5px solid var(--border2);
                border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;
                color:var(--text);background:var(--surface);outline:none"
                id="blockName_${i}"/>
              <input type="number" placeholder="Flats" value="${b.flats||''}" min="0"
                style="width:64px;height:30px;padding:0 8px;border:1.5px solid var(--border2);
                border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;
                color:var(--text);background:var(--surface);outline:none"
                id="blockFlats_${i}"/>
              <button onclick="removeBlock(${i})" style="background:var(--red-bg);border:1px solid #FECACA;
                color:var(--red);border-radius:var(--r-sm);padding:3px 7px;cursor:pointer;font-size:12px">
                <i class="ti ti-x"></i>
              </button>
            </div>`).join('')}
          </div>
          <button onclick="addBlock()" class="btn btn-white btn-sm"><i class="ti ti-plus"></i> Add Block</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-indigo btn-sm" onclick="saveBlocks('${uid}')"><i class="ti ti-device-floppy"></i> Save</button>
      </div>
      <div id="blocksMsg" style="font-size:11px;margin-top:8px;color:var(--green);display:none">✓ Saved</div>
    </div>

    <div class="section-title"><i class="ti ti-settings" style="color:var(--indigo)"></i> Manage Plan</div>
    <div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:14px">
      <div class="plan-row"><label>Plan</label>
        <select id="editPlan">
          <option value="trial" ${(u.plan||'trial')==='trial'?'selected':''}>Trial</option>
          <option value="paid"  ${u.plan==='paid'?'selected':''}>Paid</option>
        </select>
      </div>
      <div class="plan-row"><label>Expiry Date</label>
        <input type="date" id="editExpiry" value="${u.expiryDate?u.expiryDate.slice(0,10):''}"/>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <button class="btn btn-white btn-sm" onclick="extendTrial('${uid}',30)"><i class="ti ti-calendar-plus"></i> +30 days</button>
        <button class="btn btn-white btn-sm" onclick="extendTrial('${uid}',365)"><i class="ti ti-calendar-plus"></i> +1 year</button>
        <button class="btn btn-indigo btn-sm" onclick="savePlan('${uid}')"><i class="ti ti-device-floppy"></i> Save</button>
      </div>
      <div id="planMsg" style="font-size:11px;margin-top:8px;color:var(--green);display:none">✓ Saved</div>
    </div>

    <div class="section-title"><i class="ti ti-shield" style="color:var(--indigo)"></i> Account Access</div>
    <div id="pauseSection" style="background:var(--surface2);border:1.5px solid var(--border);
      border-radius:var(--r-md);padding:14px;margin-bottom:14px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap"></div>

    <div class="section-title"><i class="ti ti-lock-open" style="color:var(--amber)"></i> Password Reset</div>
    <div style="background:var(--amber-bg);border:1.5px solid #FDE68A;border-radius:var(--r-md);padding:14px;margin-bottom:14px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">
        Send a password reset link to <strong>${u.adminEmail||'this user'}</strong>.
      </div>
      <button class="btn btn-amber btn-sm" onclick="resetPassword('${u.adminEmail||''}')">
        <i class="ti ti-mail"></i> Send Reset Email
      </button>
      <div id="resetMsg" style="font-size:11px;margin-top:8px;color:var(--green);display:none"></div>
    </div>

    <div class="section-title"><i class="ti ti-alert-triangle" style="color:var(--red)"></i> Danger Zone</div>
    <div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:var(--r-md);padding:14px;margin-bottom:14px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6">
        ⚠️ Permanently deletes <strong>all flats, expenses, issues, vehicles</strong> and society data.
        <strong>Cannot be undone.</strong> The login account remains active.
      </div>
      <button class="btn btn-red btn-sm" onclick="deleteApartment('${uid}','${(u.name||'').replace(/'/g,'')}')">
        <i class="ti ti-trash"></i> Delete Apartment Data
      </button>
    </div>

    <div class="section-title"><i class="ti ti-id" style="color:var(--muted)"></i> Technical Info</div>
    <div style="font-size:11px;color:var(--muted);word-break:break-all;padding:8px;
      background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border)">
      <span style="font-weight:700;color:var(--text2)">UID:</span> ${u.uid}
      <button class="copy-btn" onclick="navigator.clipboard.writeText('${u.uid}');this.textContent='✓';setTimeout(()=>this.innerHTML='<i class=\'ti ti-copy\'></i>',1500)"><i class="ti ti-copy"></i></button>
    </div>`;

  document.getElementById('detailModal').classList.add('open');
  _renderPauseSection(u);
};

function _renderPauseSection(u) {
  const el = document.getElementById('pauseSection');
  if (!el) return;
  const isPaused = getStatus(u) === 'paused';
  el.innerHTML = `
    <div>
      <div style="font-size:12px;font-weight:700;color:${isPaused?'var(--amber)':'var(--green)'}">
        ${isPaused ? '⏸ Account is currently PAUSED' : '✅ Account is currently ACTIVE'}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">
        ${isPaused ? 'User cannot access the Gatebook app.' : 'User has full access to the Gatebook app.'}
      </div>
    </div>
    <div style="display:flex;gap:6px">
      ${isPaused
        ? `<button class="btn btn-sm" style="background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7"
             onclick="togglePause('${u.uid}',false)"><i class="ti ti-player-play"></i> Activate</button>`
        : `<button class="btn btn-sm" style="background:#FEF3C7;color:#92400E;border:1px solid #FCD34D"
             onclick="togglePause('${u.uid}',true)"><i class="ti ti-player-pause"></i> Pause</button>`
      }
    </div>`;
}

window.closeModal = function() {
  document.getElementById('detailModal').classList.remove('open');
};

window.extendTrial = function(uid, days) {
  const u = allUsers.find(x=>x.uid===uid);
  if (!u) return;
  const base = u.expiryDate && new Date(u.expiryDate) > new Date()
    ? new Date(u.expiryDate) : new Date();
  base.setDate(base.getDate() + days);
  document.getElementById('editExpiry').value = base.toISOString().slice(0,10);
};

window.savePlan = async function(uid) {
  const plan   = document.getElementById('editPlan').value;
  const expiry = document.getElementById('editExpiry').value;
  if (!expiry) { alert('Please set an expiry date.'); return; }
  try {
    const isActive = new Date(expiry) > new Date();
    await updateDoc(doc(db,'apartments',uid), {
      plan, expiryDate: new Date(expiry).toISOString(),
      status: isActive ? 'active' : 'expired',
      ...(plan==='paid' && !allUsers.find(x=>x.uid===uid)?.activatedAt
        ? { activatedAt: new Date().toISOString() } : {}),
    });
    const u = allUsers.find(x=>x.uid===uid);
    if (u) { u.plan=plan; u.expiryDate=new Date(expiry).toISOString(); }
    document.getElementById('planMsg').style.display='block';
    setTimeout(()=>document.getElementById('planMsg').style.display='none', 2500);
    renderTable(); renderStats();
  } catch(e) { alert('Save failed: '+e.message); }
};

window.resetPassword = async function(email) {
  if (!email) { alert('No email on file.'); return; }
  const msg = document.getElementById('resetMsg');
  try {
    await sendPasswordResetEmail(auth, email);
    msg.textContent = `✓ Reset email sent to ${email}`;
    msg.style.color = 'var(--green)';
    msg.style.display = 'block';
    setTimeout(()=>msg.style.display='none', 4000);
  } catch(e) {
    msg.textContent = `✗ Failed: ${e.message}`;
    msg.style.color = 'var(--red)';
    msg.style.display = 'block';
  }
};

window.togglePause = async function(uid, pause) {
  if (!confirm(`${pause ? 'Pause' : 'Activate'} this account?

${pause
    ? 'The user will not be able to access the Gatebook app.'
    : 'The user will regain full access to the Gatebook app.'}`)) return;
  try {
    await updateDoc(doc(db,'apartments',uid), { status: pause ? 'paused' : 'active' });
    const u = allUsers.find(x=>x.uid===uid);
    if (u) u.status = pause ? 'paused' : 'active';
    renderTable(); renderStats();
    _renderPauseSection(allUsers.find(x=>x.uid===uid));
    alert(`Account ${pause ? 'paused' : 'activated'} successfully.`);
  } catch(e) { alert('Failed: '+e.message); }
};

window.deleteApartment = async function(uid, name) {
  const confirmText = prompt(
    `⚠️ DELETE "${name||uid}"?\n\nThis permanently removes:\n• All flats\n• All payment records\n• All expenses\n• All issues\n• All vehicles\n• Society data\n\nThe login account will remain.\n\nType DELETE to confirm:`
  );
  if (confirmText !== 'DELETE') { alert('Cancelled — you must type DELETE exactly.'); return; }
  try {
    const subCols = ['flats','expenses','issues','vehicles','soc_expenses'];
    for (const col of subCols) {
      const snap = await getDocs(collection(db,'apartments',uid,col));
      if (!snap.empty) {
        const batch = writeBatch(db);
        snap.docs.forEach(d => batch.delete(d.ref));
        await batch.commit();
      }
    }
    await deleteDoc(doc(db,'apartments',uid));
    allUsers = allUsers.filter(u=>u.uid!==uid);
    renderTable(); renderStats();
    closeModal();
    alert(`"${name||uid}" deleted successfully.`);
  } catch(e) { alert('Delete failed: '+e.message); }
};

window.addBlock = function() {
  const editor = document.getElementById('blocksEditor');
  if (!editor) return;
  const i = editor.children.length;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:6px';
  row.id = `blockRow_${i}`;
  row.innerHTML = `
    <input type="text" placeholder="Block name e.g. B"
      style="flex:1;height:30px;padding:0 8px;border:1.5px solid var(--border2);
      border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;
      color:var(--text);background:var(--surface);outline:none" id="blockName_${i}"/>
    <input type="number" placeholder="Flats" min="0"
      style="width:64px;height:30px;padding:0 8px;border:1.5px solid var(--border2);
      border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;
      color:var(--text);background:var(--surface);outline:none" id="blockFlats_${i}"/>
    <button onclick="removeBlock(${i})" style="background:var(--red-bg);border:1px solid #FECACA;
      color:var(--red);border-radius:var(--r-sm);padding:3px 7px;cursor:pointer;font-size:12px">
      <i class="ti ti-x"></i>
    </button>`;
  editor.appendChild(row);
};

window.removeBlock = function(i) {
  const row = document.getElementById(`blockRow_${i}`);
  if (row) row.remove();
};

window.saveBlocks = async function(uid) {
  const editor = document.getElementById('blocksEditor');
  if (!editor) return;
  const blocks = [];
  editor.querySelectorAll('[id^="blockName_"]').forEach(input => {
    const idx = input.id.split('_')[1];
    const name = input.value.trim();
    const flats = parseInt(document.getElementById(`blockFlats_${idx}`)?.value||0) || 0;
    if (name) blocks.push({ name, flats });
  });
  const flatCount = parseInt(document.getElementById('editFlatCount')?.value||0) || 0;
  try {
    await updateDoc(doc(db,'apartments',uid), { blocks, totalFlats: flatCount });
    const u = allUsers.find(x=>x.uid===uid);
    if (u) { u.blocks = blocks; u.flatCount = flatCount; }
    const msg = document.getElementById('blocksMsg');
    msg.style.display = 'block';
    setTimeout(()=>msg.style.display='none', 2500);
    renderTable();
  } catch(e) { alert('Save failed: '+e.message); }
};

window.doSignOut = async function() {
  await signOut(auth);
  window.location.replace('index.html');
};
</script>
</body>
</html>
