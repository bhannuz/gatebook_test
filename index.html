<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatebook - Monthly Overview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-teal-700 text-white px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-2 text-2xl font-bold tracking-wide">
            <i class="fa-solid fa-building-shield"></i>
            <span>Gatebook</span>
        </div>
        <div class="flex items-center space-x-4">
            <i class="fa-regular fa-bell text-xl cursor-pointer hover:opacity-80"></i>
            <i class="fa-regular fa-comment text-xl cursor-pointer hover:opacity-80"></i>
            <div class="flex items-center space-x-2 border-l pl-4 border-teal-600">
                <div class="w-8 h-8 rounded-full bg-teal-500 flex items-center justify-center font-bold text-sm">A</div>
                <span class="text-sm font-medium hidden md:inline">Admin <i class="fa-solid fa-chevron-down text-xs ml-1"></i></span>
            </div>
        </div>
    </header>

    <div class="flex flex-1">
        <aside class="w-16 md:w-20 bg-teal-800 text-teal-200 flex flex-col items-center py-6 space-y-8 shadow-inner">
            <button class="p-3 rounded-xl hover:bg-teal-700 hover:text-white transition"><i class="fa-solid fa-house text-xl"></i></button>
            <button class="p-3 rounded-xl bg-teal-600 text-white transition"><i class="fa-solid fa-gauge text-xl"></i></button>
            <button class="p-3 rounded-xl hover:bg-teal-700 hover:text-white transition"><i class="fa-solid fa-wallet text-xl"></i></button>
            <button class="p-3 rounded-xl hover:bg-teal-700 hover:text-white transition"><i class="fa-solid fa-file-invoice-dollar text-xl"></i></button>
            <button class="p-3 rounded-xl hover:bg-teal-700 hover:text-white transition"><i class="fa-solid fa-gears text-xl"></i></button>
        </aside>

        <main class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full space-y-6">
            
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-slate-700">Monthly Overview - October 2023</h1>
                </div>
                <div class="bg-white border px-4 py-2 rounded-lg text-sm font-medium text-slate-600 shadow-sm cursor-pointer hover:bg-slate-50">
                    Dashboard <i class="fa-solid fa-chevron-down text-xs ml-1"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white border-l-4 border-blue-500 p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Total Expenses</p>
                        <h2 class="text-xl font-bold text-slate-800 mt-1" id="stat-expenses">₹0</h2>
                    </div>
                    <div class="p-3 bg-blue-50 text-blue-500 rounded-full"><i class="fa-solid fa-receipt text-xl"></i></div>
                </div>
                <div class="bg-white border-l-4 border-green-500 p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Total Payments Received</p>
                        <h2 class="text-xl font-bold text-slate-800 mt-1" id="stat-received">₹0</h2>
                    </div>
                    <div class="p-3 bg-green-50 text-green-500 rounded-full"><i class="fa-solid fa-hand-holding-dollar text-xl"></i></div>
                </div>
                <div class="bg-white border-l-4 border-orange-500 p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Pending Payments</p>
                        <h2 class="text-xl font-bold text-slate-800 mt-1" id="stat-pending">₹0</h2>
                    </div>
                    <div class="p-3 bg-orange-50 text-orange-500 rounded-full"><i class="fa-solid fa-clock-history text-xl"></i></div>
                </div>
                <div class="bg-white border-l-4 border-teal-500 p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Fund Balance</p>
                        <h2 class="text-xl font-bold text-slate-800 mt-1" id="stat-balance">₹0</h2>
                    </div>
                    <div class="p-3 bg-teal-50 text-teal-500 rounded-full"><i class="fa-solid fa-scale-balanced text-xl"></i></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden border">
                        <div class="flex bg-slate-50 border-b">
                            <button class="px-6 py-3 font-semibold text-sm text-teal-700 border-b-2 border-teal-700 bg-white">Expenses</button>
                            <button class="px-6 py-3 font-semibold text-sm text-slate-500 hover:text-slate-700">Payments</button>
                        </div>
                        
                        <div class="p-4 flex justify-between items-center border-b bg-slate-50/50">
                            <span class="text-sm font-bold text-slate-700 tracking-wide uppercase">List View</span>
                            <button class="text-xs bg-white border px-3 py-1.5 rounded-lg font-medium text-slate-600 shadow-sm flex items-center space-x-1">
                                <span>Reference Invoice</span> <i class="fa-solid fa-chevron-down text-[10px]"></i>
                            </button>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-100 text-slate-600 text-xs uppercase tracking-wider font-semibold border-b">
                                        <th class="py-3 px-4">Description</th>
                                        <th class="py-3 px-4">Date</th>
                                        <th class="py-3 px-4">Amount</th>
                                        <th class="py-3 px-4">Vendor</th>
                                        <th class="py-3 px-4 text-center">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="expenses-table-body" class="divide-y text-sm">
                                    </tbody>
                            </table>
                        </div>

                        <div class="p-4 bg-slate-50 border-t flex justify-end">
                            <button id="open-expense-modal" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-4 py-2 rounded-lg shadow transition flex items-center space-x-1">
                                <i class="fa-solid fa-plus"></i> <span>Add New Expense</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-xl shadow-sm border flex flex-col items-center">
                        <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 self-start">Expense Distribution</h3>
                        <div class="w-full max-w-[220px] h-[220px] relative">
                            <canvas id="distributionChart"></canvas>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <div class="p-4 bg-teal-700 text-white flex justify-between items-center">
                            <h3 class="font-bold text-sm uppercase tracking-wider">Unit Maintenance Payments</h3>
                            <button id="remind-all-btn" class="bg-white/20 hover:bg-white/30 text-white text-xs px-3 py-1.5 rounded font-semibold transition">Remind All</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs md:text-sm">
                                <thead class="bg-slate-50 text-slate-500 uppercase text-[11px] font-bold border-b">
                                    <tr>
                                        <th class="p-3">Unit</th>
                                        <th class="p-3">Owner</th>
                                        <th class="p-3">Received</th>
                                        <th class="p-3 text-center">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="payments-table-body" class="divide-y">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="expense-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full overflow-hidden border transform transition-all">
            <div class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center">
                <h3 class="font-bold text-lg">Log New Expense</h3>
                <button id="close-expense-modal" class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>
            <form id="expense-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Description / Category</label>
                    <input type="text" id="exp-desc" required placeholder="e.g. Common Area Electricity" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-600">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Amount (₹)</label>
                        <input type="number" id="exp-amount" required placeholder="350000" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Date</label>
                        <input type="date" id="exp-date" required class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-600">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Vendor</label>
                    <input type="text" id="exp-vendor" required placeholder="Vendor Co." class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-600">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Approval Status</label>
                    <select id="exp-status" class="w-full border rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-teal-600">
                        <option value="Paid">Paid</option>
                        <option value="Pending Approval">Pending Approval</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-teal-700 hover:bg-teal-800 text-white font-semibold py-2.5 rounded-lg shadow tracking-wide transition">Save to Firebase</button>
            </form>
        </div>
    </div>

    <script type="module">
        // Importing standard v11 Modules as set up in configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

        // Verified application keys configuration object
        const firebaseConfig = {
            apiKey: "AIzaSyAnUvPo_G_efbacdDApbULQgY5OToghJYM",
            authDomain: "gatebook-17065.firebaseapp.com",
            projectId: "gatebook-17065",
            storageBucket: "gatebook-17065.firebasestorage.app",
            messagingSenderId: "732765572762",
            appId: "1:732765572762:web:55f1cb897bb5804a831923",
            measurementId: "G-6YKLV11L0G",
        };

        // Execution runtime definitions
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Chart Instance Container global space assignment
        let distributionChart = null;

        // UI DOM Access Pointers
        const expenseModal = document.getElementById('expense-modal');
        const openExpenseModalBtn = document.getElementById('open-expense-modal');
        const closeExpenseModalBtn = document.getElementById('close-expense-modal');
        const expenseForm = document.getElementById('expense-form');

        // Modal Component UI Toggle Logic
        openExpenseModalBtn.addEventListener('click', () => expenseModal.classList.remove('hidden'));
        closeExpenseModalBtn.addEventListener('click', () => expenseModal.classList.add('hidden'));
        window.addEventListener('click', (e) => { if(e.target === expenseModal) expenseModal.classList.add('hidden'); });

        // Submit form data out straight to Firebase
        expenseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "expenses"), {
                    description: document.getElementById('exp-desc').value,
                    amount: parseFloat(document.getElementById('exp-amount').value),
                    date: document.getElementById('exp-date').value,
                    vendor: document.getElementById('exp-vendor').value,
                    status: document.getElementById('exp-status').value,
                    timestamp: new Date()
                });
                expenseForm.reset();
                expenseModal.classList.add('hidden');
            } catch (error) {
                console.error("Error writing document to Firebase: ", error);
                alert("Failed to sync structural asset entry down to Firebase DB.");
            }
        });

        // Initialize Real-time Data Sync Listeners
        function setupRealtimeListeners() {
            // Realtime Synchronizer Hook: Expenses
            onSnapshot(collection(db, "expenses"), (snapshot) => {
                const expensesList = [];
                snapshot.forEach(doc => expensesList.push({ id: doc.id, ...doc.data() }));
                renderExpenses(expensesList);
                recalculateMetrics(expensesList, null);
            });

            // Realtime Synchronizer Hook: Member Unit Maintenance
            onSnapshot(collection(db, "payments"), (snapshot) => {
                const paymentsList = [];
                snapshot.forEach(doc => paymentsList.push({ id: doc.id, ...doc.data() }));
                renderPayments(paymentsList);
                recalculateMetrics(null, paymentsList);
            });
        }

        // Render UI Pipeline Elements: Expenses Table Data rows
        function renderExpenses(expenses) {
            const tbody = document.getElementById('expenses-table-body');
            tbody.innerHTML = '';
            
            if(expenses.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-slate-400">No logged infrastructure data found in database.</td></tr>`;
                return;
            }

            expenses.forEach((item) => {
                const statusTheme = item.status === 'Paid' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-orange-50 text-orange-700 border-orange-200';
                const formattedAmt = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(item.amount);
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition";
                tr.innerHTML = `
                    <td class="py-3.5 px-4 font-semibold text-slate-700">${item.description}</td>
                    <td class="py-3.5 px-4 text-slate-500 whitespace-nowrap">${item.date || 'N/A'}</td>
                    <td class="py-3.5 px-4 font-mono font-medium text-slate-800">${formattedAmt}</td>
                    <td class="py-3.5 px-4 text-slate-600">${item.vendor}</td>
                    <td class="py-3.5 px-4 text-center">
                        <span class="px-2.5 py-1 text-xs font-semibold rounded-full border ${statusTheme}">${item.status}</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            updateChartData(expenses);
        }

        // Render UI Pipeline Elements: Maintenance Unit Accounts status list rows
        function renderPayments(payments) {
            const tbody = document.getElementById('payments-table-body');
            tbody.innerHTML = '';

            // Layout fallback mock context dataset strings if Firebase collection container remains empty
            const presentationArray = payments.length > 0 ? payments : [
                { unit: 'A101', owner: 'Anner Sun', received: 345000, status: 'Paid' },
                { unit: 'B203', owner: 'Ifra Shah', received: 410000, status: 'Partial' },
                { unit: 'C304', owner: 'Kanm Done', received: 310000, status: 'Partial' },
                { unit: 'C304', owner: 'Unknown Rec', received: 65000, status: 'Overdue' }
            ];

            presentationArray.forEach(item => {
                let statusBadge = '';
                if(item.status === 'Paid') statusBadge = '<span class="px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded font-bold text-[10px]">Paid</span>';
                else if(item.status === 'Partial') statusBadge = '<span class="px-2 py-0.5 bg-amber-100 text-amber-800 rounded font-bold text-[10px]">Partial</span>';
                else statusBadge = '<span class="px-2 py-0.5 bg-rose-100 text-rose-800 rounded font-bold text-[10px]">Overdue</span>';

                const formattedRec = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(item.received);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="p-3 font-bold text-slate-700">${item.unit}</td>
                    <td class="p-3 text-slate-600">${item.owner}</td>
                    <td class="p-3 font-mono text-slate-700 font-medium">${formattedRec}</td>
                    <td class="p-3 text-center">${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Metrics engine core: Global calculations for dashboard balances
        let aggregateCache = { expenses: 0, received: 1130000, pending: 65000 }; 
        function recalculateMetrics(expensesArray, paymentsArray) {
            if (expensesArray) {
                aggregateCache.expenses = expensesArray.reduce((acc, curr) => acc + (Number(curr.amount) || 0), 0);
            }
            if (paymentsArray && paymentsArray.length > 0) {
                // Synthesize from custom database dataset instances if initialized
                aggregateCache.received = paymentsArray.reduce((acc, curr) => acc + (curr.status !== 'Overdue' ? Number(curr.received || 0) : 0), 0);
                aggregateCache.pending = paymentsArray.reduce((acc, curr) => acc + (curr.status === 'Overdue' ? Number(curr.received || 0) : 0), 0);
            }

            const fundBalance = aggregateCache.received - aggregateCache.expenses;
            const formatConfig = { style: 'currency', currency: 'INR', maximumFractionDigits: 0 };

            document.getElementById('stat-expenses').innerText = new Intl.NumberFormat('en-IN', formatConfig).format(aggregateCache.expenses);
            document.getElementById('stat-received').innerText = new Intl.NumberFormat('en-IN', formatConfig).format(aggregateCache.received);
            document.getElementById('stat-pending').innerText = new Intl.NumberFormat('en-IN', formatConfig).format(aggregateCache.pending);
            document.getElementById('stat-balance').innerText = new Intl.NumberFormat('en-IN', formatConfig).format(fundBalance);
        }

        // Graphic visual update: Chart.js framework controller binding logic
        function updateChartData(expenses) {
            const categories = {};
            expenses.forEach(e => {
                categories[e.description] = (categories[e.description] || 0) + Number(e.amount);
            });

            const labels = Object.keys(categories).length ? Object.keys(categories) : ["Security Guard", "Building Maintenance", "Common Area", "Water Supply"];
            const data = Object.values(categories).length ? Object.values(categories) : [345000, 410000, 350000, 290000];
            
            const backgroundColors = ['#0284c7', '#38bdf8', '#0d9488', '#2dd4bf', '#fb923c', '#f87171'];

            if (distributionChart) {
                distributionChart.data.labels = labels;
                distributionChart.data.datasets[0].data = data;
                distributionChart.update();
            } else {
                const ctx = document.getElementById('distributionChart').getContext('2d');
                distributionChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: backgroundColors.slice(0, labels.length),
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        cutout: '70%'
                    }
                });
            }
        }

        // Initialize execution on runtime ready context
        setupRealtimeListeners();
        
        // Reminder trigger button callback feedback simulator hook
        document.getElementById('remind-all-btn').addEventListener('click', () => {
            alert('Outstanding balance alerts successfully broadcasted to defaulting apartment unit owners via SMS/Email.');
        });
    </script>
</body>
</html>
