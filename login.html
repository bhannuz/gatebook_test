<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatebook - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-bottom: 10px; color: #1e1b4b; font-size: 28px; }
        .subtitle { color: #6b7280; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #1e1b4b; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .error { color: #ef4444; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Gatebook</h1>
        <p class="subtitle">Apartment Society Management</p>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button onclick="handleLogin()">Sign In</button>
        <div class="error" id="mainError" style="margin-top: 15px;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnUvPo_G_efbacdDApbULQgY5OToghJYM",
            authDomain: "gatebook-17065.firebaseapp.com",
            projectId: "gatebook-17065",
            storageBucket: "gatebook-17065.firebasestorage.app",
            messagingSenderId: "732765572762",
            appId: "1:732765572762:web:55f1cb897bb5804a831923"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const mainError = document.getElementById('mainError');

            if (!email || !password) {
                mainError.textContent = 'Please enter email and password';
                mainError.style.display = 'block';
                return;
            }

            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                console.log('✅ Login successful');
                window.location.href = 'index.html';
            } catch (error) {
                mainError.textContent = error.message;
                mainError.style.display = 'block';
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
