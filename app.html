<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gatebook — President History</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4FF;--bg2:#E8EDFF;--surface:#FFFFFF;--surface2:#F7F9FF;--surface3:#EDF0FB;
  --border:rgba(99,102,241,0.10);--border2:rgba(99,102,241,0.18);--border3:rgba(99,102,241,0.30);
  --text:#1E1B4B;--text2:#6366A8;--muted:#A5A8D0;
  --indigo:#6366F1;--indigo2:#4F46E5;--indigo-bg:rgba(99,102,241,0.08);--indigo-glow:rgba(99,102,241,0.20);
  --green:#059669;--green-light:#10B981;--green-bg:#ECFDF5;--green-border:#A7F3D0;--green-txt:#065F46;
  --amber:#D97706;--amber-light:#F59E0B;--amber-bg:#FFFBEB;--amber-border:#FCD34D;--amber-txt:#92400E;
  --red:#DC2626;--red-light:#EF4444;--red-bg:#FEF2F2;--red-border:#FECACA;--red-txt:#991B1B;
  --sky:#0284C7;--sky-bg:#F0F9FF;--sky-border:#BAE6FD;--sky-txt:#0C4A6E;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-border:#DDD6FE;--purple-txt:#4C1D95;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-2xl:28px;
  --shadow-sm:0 1px 3px rgba(99,102,241,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 4px 16px rgba(99,102,241,0.10),0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(99,102,241,0.14),0 4px 12px rgba(0,0,0,0.06);
  --shadow-xl:0 24px 64px rgba(99,102,241,0.18);
  --font:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
/* loading overlay (preserved) */
#lo{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#EEF2FF 0%,#F0F9FF 50%,#FDF4FF 100%);display:flex;align-items:center;justify-content:center}
.lo-card{background:#fff;border-radius:var(--r-2xl);padding:40px 48px;text-align:center;box-shadow:var(--shadow-xl);display:flex;flex-direction:column;align-items:center;gap:18px}
.lo-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;box-shadow:0 8px 24px rgba(99,102,241,0.35);animation:loPulse 2s ease-in-out infinite}
@keyframes loPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.lo-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.lo-title span{background:linear-gradient(90deg,#6366F1,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lo-bar{width:200px;height:4px;background:var(--bg2);border-radius:99px;overflow:hidden}
.lo-fill{height:100%;background:linear-gradient(90deg,#6366F1,#8B5CF6,#06B6D4);background-size:200%;animation:loSlide 1.6s ease-in-out infinite}
@keyframes loSlide{0%{background-position:0%}100%{background-position:200%}}
.navbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:9px}
.nav-logo{width:30px;height:30px;border-radius:8px;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.nav-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.2px}
.nav-name em{font-style:normal;color:var(--indigo)}
.flat-count-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--indigo-bg);color:var(--indigo);white-space:nowrap}
.sync-chip{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--muted)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.sdot.live{background:var(--green-light)}
.user-chip{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;padding:4px 6px;border-radius:var(--r-sm)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:var(--r-md);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .18s}
.btn-indigo{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,0.30)}
.btn-green{background:linear-gradient(135deg,#059669,#10B981);color:#fff}
.btn-white{background:#fff;color:var(--text);border:1.5px solid var(--border2)}
.tab-bar-wrap{position:sticky;top:56px;z-index:90;background:#f8f8fc;border-bottom:1px solid var(--border);padding:0 1.5rem}
.view-tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 0}
.vtab{flex-shrink:0;padding:0 14px;height:34px;font-size:12px;font-weight:700;cursor:pointer;border-radius:8px;display:inline-flex;align-items:center;gap:6px;border:1.5px solid transparent;background:#fff;color:var(--text2);transition:all 0.15s}
.vtab[data-v="analytics"],.vtab[data-v="president"],.vtab[data-v="payments"],.vtab[data-v="issues"],.vtab[data-v="structure"],.vtab[data-v="history"]{border-color:#6366F1;color:#6366F1;background:rgba(99,102,241,.06)}
.vtab.active{background:#6366F1;color:#fff;border-color:#6366F1;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.vtab-badge{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:700;background:rgba(255,255,255,.3);color:inherit}
.nav-right{display:flex;align-items:center;gap:12px}
.app{max-width:1320px;margin:0 auto;padding:0 1.5rem 4rem}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.2rem}
.scard{background:#fff;border-radius:var(--r-lg);padding:12px 14px;border:1.5px solid transparent;box-shadow:var(--shadow-sm);position:relative}
.scard.indigo{border-color:rgba(99,102,241,.12)}.scard.green{border-color:rgba(5,150,105,.12)}
.sc-value{font-size:18px;font-weight:800;color:var(--text)}
.tab-table-wrap{background:#fff;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border2);border-top:3px solid #6366F1}
.mem-table{width:100%;border-collapse:collapse}
.mem-table th{background:var(--surface3);padding:9px 14px;font-size:10px;font-weight:700;color:var(--muted);text-align:left}
.mem-table td{padding:11px 14px;font-size:13px;font-weight:500;color:var(--text);border-bottom:1px solid var(--border)}
.tab-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700}
.tab-chip.indigo{background:var(--indigo-bg);color:var(--indigo)}
.tab-chip.purple{background:var(--purple-bg);color:var(--purple-txt)}
.mbg{display:none;position:fixed;inset:0;z-index:500;background:rgba(30,27,75,0.45);backdrop-filter:blur(10px);align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:var(--r-2xl);width:min(560px,100%);max-height:92vh;overflow-y:auto;padding:28px;box-shadow:var(--shadow-xl)}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase}
.fg input,.fg select{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r-md);padding:10px 13px;font-size:13px;font-weight:600}
.mactions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1.5px solid var(--border2)}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:13px 20px;border-radius:var(--r-lg);font-size:13px;font-weight:700;background:#fff;box-shadow:var(--shadow-xl);opacity:0;transition:all .25s}
#toast.show{opacity:1}
.bottom-nav-bar{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--surface);border-top:1.5px solid var(--border2);justify-content:space-around;align-items:stretch}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;border:none;font-size:9px;font-weight:700;color:var(--muted)}
.bnav-item.active{color:var(--indigo)}
@media(max-width:600px){.tab-bar-wrap{display:none}.bottom-nav-bar{display:flex}.app{padding-bottom:5.5rem}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="lo"><div class="lo-card"><div class="lo-icon"><i class="ti ti-building-community"></i></div><div class="lo-title">Gate<span>book</span></div><div class="lo-sub">Powered by AK Group</div><div class="lo-bar"><div class="lo-fill"></div></div></div></div>
<div id="app" style="display:none">
<nav class="navbar">
  <div class="nav-brand"><div class="nav-logo"><i class="ti ti-building-community"></i></div><span class="nav-name" id="aptNameDisplay">Gate<em>book</em></span><span class="flat-count-badge" id="flatCountBadge" style="display:none"></span></div>
  <div class="nav-right"><div class="sync-chip"><span class="sdot" id="sdot"></span><span id="slbl">–</span></div><div class="user-chip" onclick="window._doSignOut()"><div class="user-avatar" id="userAvatar">?</div><span id="userName">Admin</span><i class="ti ti-logout"></i></div></div>
</nav>
<div class="app">
  <div class="stats-row" id="statsRow"></div>
  <!-- TABS: added History as the 6th tab next to Structure -->
  <div class="tab-bar-wrap">
    <div class="view-tabs" id="viewTabs">
      <button class="vtab active" data-v="analytics" onclick="switchView('analytics')"><i class="ti ti-chart-pie"></i> Analytics</button>
      <button class="vtab" data-v="president" onclick="switchView('president')"><i class="ti ti-receipt"></i> Expenses</button>
      <button class="vtab" data-v="payments" onclick="switchView('payments')"><i class="ti ti-credit-card"></i> Payments</button>
      <button class="vtab" data-v="structure" onclick="switchView('structure')"><i class="ti ti-building"></i> Structure</button>
      <button class="vtab" data-v="history" onclick="switchView('history')"><i class="ti ti-history"></i> History</button>
      <button class="vtab" data-v="issues" onclick="switchView('issues')"><i class="ti ti-alert-circle"></i> Issues<span class="vtab-badge" id="openCnt">0</span></button>
    </div>
  </div>
  <!-- PAYMENTS VIEW (simplified) -->
  <div id="pView" style="display:none"><div class="tab-table-wrap"><div style="padding:20px;text-align:center;color:var(--muted)"><i class="ti ti-credit-card"></i> Payments module active</div></div></div>
  <!-- ISSUES VIEW -->
  <div id="iView" style="display:none"><div class="tab-table-wrap" id="iList"></div></div>
  <!-- PRESIDENT VIEW (Expenses) -->
  <div id="presView" style="display:none"><div id="presBanner"></div><div id="fundRow" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px"></div><div class="tab-table-wrap"><div id="presExpList" style="padding:12px"></div></div></div>
  <!-- ANALYTICS VIEW -->
  <div id="analyticsView" style="display:none"><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" id="analyticsTotals"></div><div class="tab-table-wrap" style="margin-top:14px"><div id="anPayTable" style="padding:12px"></div></div></div>
  <!-- STRUCTURE VIEW -->
  <div id="structureView" style="display:none"><div class="tab-table-wrap"><div id="strBlocks" style="padding:12px"></div></div></div>
  <!-- ========== HISTORY VIEW: Past Presidents & Society Fund Records ========== -->
  <div id="historyView" style="display:none;padding:10px 0">
    <div style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><i class="ti ti-crown" style="color:var(--purple);font-size:20px"></i><h3 style="font-size:16px;font-weight:800">📜 Past Presidents</h3></div>
      <div class="tab-table-wrap purple" id="pastPresidentsContainer">
        <div style="padding:24px;text-align:center;color:var(--muted)"><i class="ti ti-loader-2" style="animation:spin 1s infinite"></i> Loading history...</div>
      </div>
    </div>
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><i class="ti ti-database" style="color:var(--indigo);font-size:20px"></i><h3 style="font-size:16px;font-weight:800">🏛️ Society Fund Expenditure History</h3></div>
      <div class="tab-table-wrap indigo" id="socExpHistoryContainer">
        <div style="padding:24px;text-align:center;color:var(--muted)"><i class="ti ti-loader-2" style="animation:spin 1s infinite"></i> Loading records...</div>
      </div>
    </div>
  </div>
  <!-- ========== END HISTORY ========== -->
  <!-- LEGACY MODALS -->
  <div class="mbg" id="presM"><div class="modal"><div class="fg"><label>Select Flat</label><select id="presFlat"></select></div><div class="fg"><label>President Name</label><input id="presName"/></div><div class="mactions"><button class="btn btn-white" onclick="window._cPresM()">Cancel</button><button class="btn btn-indigo" id="presSaveBtn" onclick="window._sPres()">Elect</button></div></div></div>
</div></div>
<div id="toast"><i id="tIco" class="ti ti-check"></i><span id="tMsg"></span></div>
<script type="module">
import { auth, db } from './js/firebase.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js';
import { collection, doc, getDocs, getDoc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

let UID = null;
const ADMIN_EMAIL = 'admin@gatebook.app';
onAuthStateChanged(auth, user => {
  if (!user) { window.location.replace('index.html'); return; }
  if (user.email === ADMIN_EMAIL) { window.location.replace('admin.html'); return; }
  UID = user.uid;
  document.getElementById('userAvatar').textContent = (user.displayName||user.email||'A').charAt(0).toUpperCase();
  document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
  boot();
});
window._doSignOut = async () => { await signOut(auth); window.location.replace('index.html'); };

const flatsColl = () => collection(db, 'apartments', UID, 'flats');
const expColl = () => collection(db, 'apartments', UID, 'expenses');
const issuesColl = () => collection(db, 'apartments', UID, 'issues');
const aptDocRef = () => doc(db, 'apartments', UID);
const sexpColl = () => collection(db, 'apartments', UID, 'soc_expenses');
const presidentHistoryColl = () => collection(db, 'apartments', UID, 'presidentHistory');

let flats = new Map();
let issues = [];
let socExps = [];
let president = null;
let APT_NAME = 'Gatebook';
let AM = new Date().toISOString().slice(0,7);
const inr = n => '₹'+Number(n||0).toLocaleString('en-IN');
const st = f => f.paid>=f.due?'paid':f.paid>0?'partial':'pending';
const fdt = ts => ts?.toDate?.().toLocaleDateString('en-IN') || (ts ? new Date(ts).toLocaleDateString('en-IN') : '—');

function toast(msg, t='success'){ const el=document.getElementById('toast'); document.getElementById('tMsg').textContent=msg; el.className='show '+t; setTimeout(()=>el.className='',2500); }
function sync(s){ const d=document.getElementById('sdot'); if(d){ d.className='sdot '+s; document.getElementById('slbl').textContent={live:'Live',saving:'Saving…',error:'Error'}[s]; } }

async function loadPresidentHistory() {
  const container = document.getElementById('pastPresidentsContainer');
  if(!container) return;
  try {
    const snap = await getDocs(query(presidentHistoryColl(), orderBy('archivedAt', 'desc')));
    if(snap.empty) {
      container.innerHTML = `<div style="padding:32px;text-align:center;color:var(--muted)"><i class="ti ti-user-off"></i> No past presidents recorded.</div>`;
      return;
    }
    const rows = [];
    snap.forEach(d => rows.push({id:d.id, ...d.data()}));
    container.innerHTML = `
      <table class="mem-table" style="width:100%">
        <thead><tr><th>Name</th><th>Flat</th><th>Term Start</th><th>Term End</th><th>Tenure</th><th>Phone</th></tr></thead>
        <tbody>${rows.map(p => {
          const start = p.termStart ? new Date(p.termStart) : null;
          const endRaw = p.termEnd || p.archivedAt;
          const endDate = endRaw ? new Date(endRaw) : new Date();
          let tenure = '—';
          if(start && !isNaN(start)) {
            const months = Math.max(0, (endDate.getFullYear()-start.getFullYear())*12 + (endDate.getMonth()-start.getMonth()));
            tenure = months < 1 ? '<1m' : months === 1 ? '1m' : months < 12 ? `${months}m` : `${Math.floor(months/12)}y ${months%12}m`;
          }
          return `<tr><td><span class="tab-chip purple"><i class="ti ti-crown"></i> ${p.name||'—'}</span></td>
          <td><span class="tab-chip indigo">${p.flatId||'—'}</span></td>
          <td>${p.termStart ? new Date(p.termStart).toLocaleDateString('en-IN') : '—'}</td>
          <td>${endRaw ? new Date(endRaw).toLocaleDateString('en-IN') : '—'}</td>
          <td><span class="tab-chip purple">${tenure}</span></td>
          <td>${p.phone||'—'}</td></tr>`;
        }).join('')}</tbody>
      </table>`;
  } catch(e) { console.error(e); container.innerHTML = `<div style="padding:24px;color:var(--red)">Failed to load history.</div>`; }
}

async function loadSocietyExpensesHistory() {
  const container = document.getElementById('socExpHistoryContainer');
  if(!container) return;
  try {
    const snap = await getDocs(query(sexpColl(), orderBy('createdAt', 'desc')));
    if(snap.empty) {
      container.innerHTML = `<div style="padding:32px;text-align:center;color:var(--muted)"><i class="ti ti-receipt-off"></i> No expense records found.</div>`;
      return;
    }
    let totalSpent = 0;
    const rows = [];
    snap.forEach(d => {
      const data = d.data();
      totalSpent += (data.amt || 0);
      rows.push(data);
    });
    container.innerHTML = `
      <div style="padding:12px 16px;background:var(--surface3);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center">
        <span><i class="ti ti-wallet"></i> <strong>Total Society Expenditure:</strong> ${inr(totalSpent)}</span>
        <span style="font-size:11px;color:var(--muted)">${rows.length} records</span>
      </div>
      <table class="mem-table" style="width:100%">
        <thead><tr><th>Title</th><th>Category</th><th>Amount</th><th>Date</th><th>Paid By</th><th>Vendor</th></tr></thead>
        <tbody>${rows.map(e => `<tr>
          <td><span class="tab-chip indigo">${e.title||'—'}</span></td>
          <td><span class="tab-chip purple">${e.cat||'Other'}</span></td>
          <td style="font-weight:800;color:var(--red)">${inr(e.amt)}</td>
          <td>${e.date||fdt(e.createdAt)}</td>
          <td>${e.paidBy||'President'}</td>
          <td>${e.vendor||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>`;
  } catch(e) { console.error(e); container.innerHTML = `<div style="padding:24px;color:var(--red)">Error loading expenses.</div>`; }
}

function rStats(){
  const all=[...flats.values()];
  const due=all.reduce((s,f)=>s+f.due,0);
  const paid=all.reduce((s,f)=>s+f.paid,0);
  document.getElementById('statsRow').innerHTML=`<div class="scard indigo"><div class="sc-value">${inr(due)}</div><div>Total Due</div></div><div class="scard green"><div class="sc-value">${inr(paid)}</div><div>Collected</div></div><div class="scard"><div class="sc-value">${all.length}</div><div>Flats</div></div>`;
  document.getElementById('openCnt').innerText=issues.filter(i=>i.status==='open').length;
  document.getElementById('flatCountBadge').innerText=`${all.length} flats`;
}
function switchView(v){
  document.getElementById('pView').style.display=v==='payments'?'block':'none';
  document.getElementById('iView').style.display=v==='issues'?'block':'none';
  document.getElementById('presView').style.display=v==='president'?'block':'none';
  document.getElementById('analyticsView').style.display=v==='analytics'?'block':'none';
  document.getElementById('structureView').style.display=v==='structure'?'block':'none';
  document.getElementById('historyView').style.display=v==='history'?'block':'none';
  document.querySelectorAll('.vtab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  document.querySelectorAll('.bnav-item').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  if(v==='history'){ loadPresidentHistory(); loadSocietyExpensesHistory(); }
  if(v==='president'){ rPresidentSimple(); }
  if(v==='analytics'){ rAnalyticsSimple(); }
  if(v==='structure'){ rStructureSimple(); }
}
function rPresidentSimple(){
  const banner=document.getElementById('presBanner');
  const fundRow=document.getElementById('fundRow');
  const expList=document.getElementById('presExpList');
  if(president && president.name){
    banner.innerHTML=`<div style="background:var(--indigo-bg);border-radius:99px;padding:6px 16px;display:inline-flex;align-items:center;gap:10px;margin-bottom:12px"><i class="ti ti-crown"></i><strong>${president.name}</strong> (Flat ${president.flatId})</div>`;
  } else { banner.innerHTML=`<div class="btn btn-indigo btn-sm" onclick="window._oPresM()">+ Elect President</div>`; }
  const totalExp = socExps.reduce((s,e)=>s+(e.amt||0),0);
  fundRow.innerHTML=`<div class="scard"><div class="sc-value">${inr(totalExp)}</div><div>Total Spent</div></div><div class="scard"><div class="sc-value">${socExps.length}</div><div>Transactions</div></div>`;
  if(!socExps.length) expList.innerHTML=`<div style="text-align:center;padding:32px">No expenses recorded.</div>`;
  else expList.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">${socExps.slice(0,10).map(e=>`<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--border)"><span>${e.title||e.cat}</span><span>${inr(e.amt)}</span><span style="font-size:10px">${e.date||''}</span></div>`).join('')}</div>`;
}
function rAnalyticsSimple(){
  const all=[...flats.values()];
  const paid=all.reduce((s,f)=>s+f.paid,0);
  const due=all.reduce((s,f)=>s+f.due,0);
  document.getElementById('analyticsTotals').innerHTML=`<div class="scard green"><div class="sc-value">${inr(paid)}</div><div>Collected</div></div><div class="scard red"><div class="sc-value">${inr(due-paid)}</div><div>Outstanding</div></div>`;
  document.getElementById('anPayTable').innerHTML=`<div style="padding:12px">${all.length} flats registered</div>`;
}
function rStructureSimple(){
  const blocks = [...new Set([...flats.values()].map(f=>f.block).filter(Boolean))];
  document.getElementById('strBlocks').innerHTML = blocks.map(b=>`<div style="padding:12px;border-bottom:1px solid var(--border)"><strong>Block ${b}</strong> : ${[...flats.values()].filter(f=>f.block===b).length} flats</div>`).join('')||'<div style="padding:12px">No blocks</div>';
}
function rIssues(){ const el=document.getElementById('iList'); if(!issues.length){ el.innerHTML='<div style="padding:40px;text-align:center">No issues</div>'; return; } el.innerHTML=`<table class="mem-table"><thead><tr><th>Title</th><th>Status</th></tr></thead><tbody>${issues.slice(0,5).map(i=>`<tr><td>${i.title}</td><td>${i.status}</td></tr>`).join('')}</tbody></table>`; }
async function listenFlats(){ onSnapshot(flatsColl(), snap=>{ flats.clear(); snap.forEach(d=>flats.set(d.id,{flatId:d.id,...d.data()})); rStats(); if(document.getElementById('historyView').style.display!=='none'){ loadPresidentHistory(); } if(document.getElementById('presView').style.display!=='none') rPresidentSimple(); if(document.getElementById('analyticsView').style.display!=='none') rAnalyticsSimple(); if(document.getElementById('structureView').style.display!=='none') rStructureSimple(); sync('live'); }); }
function listenIssues(){ onSnapshot(issuesColl(), snap=>{ issues=[]; snap.forEach(d=>issues.push({id:d.id,...d.data()})); rIssues(); rStats(); }); }
function listenSocExp(){ onSnapshot(sexpColl(), snap=>{ socExps=[]; snap.forEach(d=>socExps.push({id:d.id,...d.data()})); if(document.getElementById('presView').style.display!=='none') rPresidentSimple(); if(document.getElementById('historyView').style.display!=='none') loadSocietyExpensesHistory(); }); }
function listenPresident(){ onSnapshot(aptDocRef(), snap=>{ if(snap.exists()) president=snap.data().president||null; if(document.getElementById('presView').style.display!=='none') rPresidentSimple(); }); }
async function boot(){
  try{
    const aptSnap=await getDoc(aptDocRef());
    if(aptSnap.exists() && aptSnap.data().name) APT_NAME=aptSnap.data().name;
    document.getElementById('aptNameDisplay').innerHTML = `${APT_NAME.replace(/(\w+)$/,'<em>$1</em>')}`;
    const flatsSnap=await getDocs(flatsColl());
    if(flatsSnap.empty){
      document.getElementById('lo').style.display='none';
      alert('No flats found. Please use admin panel or create via setup.');
      return;
    }
    listenFlats(); listenIssues(); listenSocExp(); listenPresident();
    document.getElementById('lo').style.display='none';
    document.getElementById('app').style.display='';
    switchView('analytics');
  } catch(e){ console.error(e); document.getElementById('lo').innerHTML='<div>Error loading data</div>'; }
}
// President election modal simple
window._oPresM = function(){
  document.getElementById('presFlat').innerHTML = [...flats.values()].filter(f=>f.owner).map(f=>`<option value="${f.flatId}">${f.flatId} — ${f.owner}</option>`).join('');
  document.getElementById('presName').value = president?.name||'';
  document.getElementById('presM').classList.add('open');
};
window._cPresM = function(){ document.getElementById('presM').classList.remove('open'); };
window._sPres = async function(){
  const flatId = document.getElementById('presFlat').value;
  const name = document.getElementById('presName').value.trim();
  if(!name) return toast('Enter name','error');
  await setDoc(aptDocRef(), { president:{ flatId, name, termStart:new Date().toISOString().split('T')[0], updatedAt:new Date().toISOString() } }, { merge:true });
  toast(`President ${name} elected`);
  window._cPresM();
};
window.switchView = switchView;
window._doSignOut = window._doSignOut;
// Expose for bottom nav dynamic binding
document.querySelectorAll('.bnav-item').forEach(btn => { btn.onclick = () => switchView(btn.dataset.v); });
</script>
<!-- bottom nav mobile -->
<nav class="bottom-nav-bar" id="bottomNav">
  <button class="bnav-item active" data-v="analytics"><i class="ti ti-chart-pie"></i>Analytics</button>
  <button class="bnav-item" data-v="president"><i class="ti ti-receipt"></i>Expenses</button>
  <button class="bnav-item" data-v="payments"><i class="ti ti-credit-card"></i>Payments</button>
  <button class="bnav-item" data-v="structure"><i class="ti ti-building"></i>Structure</button>
  <button class="bnav-item" data-v="history"><i class="ti ti-history"></i>History</button>
  <button class="bnav-item" data-v="issues"><i class="ti ti-alert-circle"></i>Issues</button>
</nav>
</body>
